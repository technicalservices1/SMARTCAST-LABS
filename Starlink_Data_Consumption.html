<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="Anthony Maio">
<title>Starlink Data Consumption &mdash; SmartSource</title>
<style>
  :root{
    --bg:#0f1117; --panel:#161923; --panel2:#1c2030; --line:#262b3a;
    --txt:#e6e9f0; --mut:#8b93a7; --amber:#f59e0b; --blue:#60a5fa;
    --green:#34d399; --red:#f87171; --violet:#a78bfa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;padding:18px 30px 24px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1460px;margin:0 auto}
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line)}
  .title h1{font-size:23px;font-weight:700;letter-spacing:.2px}
  .title h1 .accent{color:var(--amber)}
  .title .sub{color:var(--mut);font-size:13px;margin-top:4px}
  .meta{text-align:right;font-size:12.5px;color:var(--mut);line-height:1.7}
  .meta b{color:var(--blue);font-weight:600}
  .meta .stamp{color:var(--amber);font-weight:600}

  .hero{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:14px;margin-bottom:12px}
  @media(max-width:1180px){.hero{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:640px){.hero{grid-template-columns:repeat(2,1fr)}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 18px}
  .metric .label{color:var(--mut);font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .metric .val{font-size:27px;font-weight:750;margin-top:6px;letter-spacing:-.5px}
  .metric .val.amber{color:var(--amber)} .metric .val.blue{color:var(--blue)}
  .metric .val.red{color:var(--red)} .metric .val.green{color:var(--green)} .metric .val.violet{color:var(--violet)}
  .metric .val .u{font-size:14px;color:var(--mut);font-weight:600;margin-left:4px}
  .metric .foot{color:var(--mut);font-size:11.5px;margin-top:6px}
  .metric .bar{height:5px;border-radius:4px;background:var(--line);margin-top:11px;overflow:hidden}
  .metric .bar>i{display:block;height:100%}
  .card.metric.clickable{cursor:pointer;transition:border-color .15s,background .15s}
  .card.metric.clickable:hover{border-color:var(--amber);background:var(--panel2)}
  .card.metric.clickable.active-filter{border-color:var(--amber);background:rgba(245,158,11,.06)}
  .filter-note{display:flex;align-items:center;gap:10px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:9px 16px;margin-bottom:14px;font-size:12.5px;color:#f6d38a}
  .filter-note button{margin-left:auto;background:none;border:1px solid rgba(245,158,11,.4);color:#f6d38a;border-radius:6px;padding:3px 10px;font-size:11.5px;cursor:pointer;font-weight:600}
  .filter-note button:hover{background:rgba(245,158,11,.15)}

  .searchbar{position:relative;margin-bottom:14px}
  .searchbar input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px 90px 11px 40px;color:var(--txt);font-size:13.5px;font-family:inherit}
  .searchbar input::placeholder{color:var(--mut)}
  .searchbar input:focus{outline:none;border-color:var(--amber)}
  .searchbar svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--mut);pointer-events:none}
  .searchbar .sb-clear{position:absolute;right:82px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mut);font-size:18px;cursor:pointer;padding:2px 8px;display:none}
  .searchbar .sb-clear:hover{color:var(--txt)}
  .searchbar.has-text .sb-clear{display:block}
  .searchbar .sb-go{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--amber);color:#1a1200;border:none;border-radius:7px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
  .searchbar .sb-go:hover{background:#fbbf24}

  .sumbar{display:flex;flex-wrap:wrap;gap:26px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 22px;margin-bottom:14px}
  .sumbar .it{font-size:12.5px;color:var(--mut)}
  .sumbar .it b{color:var(--txt);font-weight:650;font-size:13.5px}
  .sumbar .it .k{color:var(--blue)}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:14px}
  @media(max-width:1080px){.cols{grid-template-columns:1fr}}
  h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--mut);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;justify-content:space-between}
  h2.sec .lbl{display:flex;align-items:center;gap:8px}
  h2.sec .cnt{color:var(--mut);font-weight:600;text-transform:none;letter-spacing:0;font-size:11.5px}
  h2.sec .dot{width:7px;height:7px;border-radius:50%;background:var(--amber)}
  h2.sec .dot.blue{background:var(--blue)} h2.sec .dot.red{background:var(--red)}

  .scrollbox{max-height:390px;overflow-y:auto;border-radius:10px}
  .scrollbox::-webkit-scrollbar{width:8px}
  .scrollbox::-webkit-scrollbar-track{background:transparent}
  .scrollbox::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .scrollbox::-webkit-scrollbar-thumb:hover{background:#333a4d}

  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{position:sticky;top:0;background:var(--panel);z-index:2;text-align:left;color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;border-bottom:1px solid var(--line)}
  td{padding:9px 10px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--panel2)}
  td.kit{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;color:var(--mut)}
  td.ecode{color:var(--mut);font-size:12px;min-width:70px}
  td.client-cell{color:var(--txt);font-size:12.5px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  td.days-badge{font-variant-numeric:tabular-nums;font-weight:650;color:var(--txt)}
  td.days-badge.soon{color:var(--red)}
  td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:650}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:650}
  .pill.p50{background:rgba(96,165,250,.14);color:var(--blue)}
  .pill.p500{background:rgba(167,139,250,.16);color:var(--violet)}
  .over{color:var(--red);font-weight:700}
  .rank{color:var(--mut);font-weight:700;width:26px}
  .ubar{position:relative;height:20px;background:var(--line);border-radius:5px;overflow:hidden;min-width:90px}
  .ubar>i{position:absolute;left:0;top:0;bottom:0;border-radius:5px;background:linear-gradient(90deg,var(--amber),#fbbf24)}
  .empty{color:var(--mut);font-size:13px;padding:20px;text-align:center}

  footer{margin-top:16px;padding-top:12px;border-top:1px solid var(--line);color:var(--mut);font-size:11.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}

</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">
      <h1>Starlink <span class="accent">Data Consumption</span></h1>
      <div class="sub">SmartSource fleet usage &mdash; per billing cycle</div>
    </div>
    <div class="meta" id="meta"></div>
  </header>

  <div class="hero" id="hero"></div>
  <div class="sumbar" id="sumbar"></div>
  <div class="searchbar" id="searchbarWrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="sb-clear" id="searchClear">&times;</button>
    <button class="sb-go" id="searchGo">Search</button>
  </div>
  <div class="filter-note" id="filterNote" style="display:none"></div>

  <div class="cols">
    <div class="card">
      <h2 class="sec">
        <span class="lbl"><span class="dot red"></span> Overage Watchlist &mdash; kits past plan allotment</span>
        <span class="cnt" id="overCnt"></span>
      </h2>
      <div class="scrollbox" id="overWrap"></div>
    </div>
    <div class="card">
      <h2 class="sec">
        <span class="lbl"><span class="dot"></span> All Devices</span>
        <span class="cnt" id="topCnt"></span>
      </h2>
      <div class="scrollbox" id="topWrap"></div>
    </div>
  </div>

  <footer>
    <div>Starlink Data Consumption Dashboard &middot; SmartSource Rentals</div>
    <div id="foot"></div>
  </footer>
</div>

function compute(data){
  // normalize every record to the real plan (50 GB) regardless of what the source file says
  // De-duplicate by kit — the source export occasionally lists the same kit twice (a real
  // usage row plus a stray 0 GB phantom row). Keep whichever row has the higher usage.
  const byKit = new Map();
  data.records.forEach(r=>{
    const existing = byKit.get(r.kit);
    if(!existing || r.usage > existing.usage) byKit.set(r.kit, r);
  });
  const recs = [...byKit.values()].map(r=>({...r, ecode:ECODE_MAP[r.kit]||r.ecode||''}));
  const total = recs.reduce((s,r)=>s+r.usage,0);
  const pool = recs.reduce((s,r)=>s+(r.planGB||0),0);
  const active = recs.filter(r=>r.usage>0).length;
  const over = recs.filter(r=>r.planGB>0 && r.usage>r.planGB)
                   .map(r=>({...r,overBy:r.usage-r.planGB}))
                   .sort((a,b)=>b.overBy-a.overBy);
  const top = [...recs].sort((a,b)=>b.usage-a.usage);
  const tiers={};
  recs.forEach(r=>{const k=r.plan||'Other';(tiers[k]=tiers[k]||{n:0,gb:0}); tiers[k].n++; tiers[k].gb+=r.usage;});
  return {recs,total,pool,active,over,top,tiers};
}

function render(data){

    'Data refreshed &nbsp;<span class="stamp">'+new Date().toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})+'</span>';

  const idle=m.recs.length-m.active;
  const poolPct = m.pool>0 ? Math.min(100, m.total/m.pool*100) : 0;

  // Build one tile per plan tier actually present in the file — fully data-driven,
  // not hardcoded to any specific plan size. Sorted by plan size ascending.
  // Each tile is clickable: click filters both tables down to just that plan tier.
  const tierColors = ['blue','violet','green','amber'];
  const tierNames = Object.keys(m.tiers).sort((a,b)=>(parseFloat(a)||0)-(parseFloat(b)||0));
  const tierCards = tierNames.map((name,i)=>{
    const t = m.tiers[name];
    const color = tierColors[i % tierColors.length];
    const isActive = activePlanFilter===name;
    return heroCard(name+' Plan', fmt(t.n), 'kits', color, fmt(t.gb,0)+' GB used this cycle', null, null, {clickable:true, planName:name, active:isActive});
  });

  document.getElementById('hero').innerHTML = [
    heroCard('Total Data Consumed', (m.total/1000).toFixed(2), 'TB', 'amber', fmt(m.total,0)+' GB this cycle'),
    heroCard('Data Pool', (m.pool/1000).toFixed(2), 'TB', 'green', fmt(m.pool,0)+' GB allotted &middot; <span style="color:var(--red);font-weight:700">'+poolPct.toFixed(0)+'% used</span>', poolPct, 'var(--green)'),
    heroCard('Active Kits', fmt(m.active), '', 'blue', 'of '+m.recs.length+' provisioned', null, null, {clickable:true, statusName:'active', active:activeStatusFilter==='active'}),
    heroCard('Idle Kits', fmt(idle), '', 'green', '0 GB used this cycle', null, null, {clickable:true, statusName:'idle', active:activeStatusFilter==='idle'}),
    ...tierCards
  ].join('');

  // wire up click handlers on the tier tiles just rendered
  document.querySelectorAll('#hero .card.clickable').forEach(el=>{
    el.addEventListener('click', ()=>{
      const plan = el.getAttribute('data-plan');
      const status = el.getAttribute('data-status');
      if(plan!=null){ activePlanFilter = (activePlanFilter===plan) ? null : plan; }
      if(status!=null){ activeStatusFilter = (activeStatusFilter===status) ? null : status; }
      render(data);
    });
  });

  document.getElementById('sumbar').innerHTML =
    sb('Kits total',m.recs.length)+
    tierNames.map(name=>sb(name+' plans', m.tiers[name].n)).join('')+
    sb('Data pool', tb(m.pool))+
    sb('Avg / active kit', m.active? tb(m.total/m.active):'\u2014')+
    sb('Peak kit', tb(m.top[0]?m.top[0].usage:0));

  // filter note banner — combines plan + status + search filters when active
  const fn = document.getElementById('filterNote');
  if(activePlanFilter || activeStatusFilter || searchQuery){
    const parts = [];
    if(activeStatusFilter) parts.push(activeStatusFilter==='active' ? 'Active' : 'Idle');
    if(activePlanFilter) parts.push(activePlanFilter);
    if(searchQuery) parts.push('"'+searchQuery+'"');
    fn.style.display='flex';
    fn.innerHTML = `<span>Showing only <b>${parts.join(' \u00b7 ')}</b> kits</span><button id="clearFilterBtn">Clear filter</button>`;
    document.getElementById('clearFilterBtn').addEventListener('click', ()=>{
      activePlanFilter=null; activeStatusFilter=null; searchQuery='';
      document.getElementById('searchInput').value='';
      document.getElementById('searchbarWrap').classList.remove('has-text');
      render(data);
    });
  } else {
    fn.style.display='none';
    fn.innerHTML='';
  }

  const matchesFilters = r => {
    if(activePlanFilter && r.plan!==activePlanFilter) return false;
    if(activeStatusFilter && (activeStatusFilter==='active' ? r.usage<=0 : r.usage!==0)) return false;
    if(searchQuery){
      const info = CLIENT_MAP[r.kit];
      const hay = info ? ((info.client||'')+' '+(info.orderNumber||'')).toLowerCase() : '';
      if(!hay.includes(searchQuery)) return false;
    }
    return true;
  };

  const overFiltered = m.over.filter(matchesFilters);
  const topFiltered = m.top.filter(matchesFilters);

  document.getElementById('overCnt').textContent = overFiltered.length+' kits';
  const ow=document.getElementById('overWrap');
  if(!overFiltered.length){ ow.innerHTML='<div class="empty">No kits over plan allotment'+((activePlanFilter||activeStatusFilter)?' match this filter':'')+' this cycle.</div>'; }
  else{
    let rows=overFiltered.map(r=>`<tr>
      <td class="kit">${r.kit}</td>
      <td class="ecode">${r.ecode||''}</td>
      <td><span class="pill ${r.planGB===50?'p50':'p500'}">${r.plan}</span></td>
      <td class="num">${fmt(r.usage,1)}</td>
      <td class="num over">+${fmt(r.overBy,1)}</td></tr>`).join('');
    ow.innerHTML=`<table><thead><tr><th>Kit</th><th>ECODE</th><th>Plan</th><th>Used (GB)</th><th>Over (GB)</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  document.getElementById('topCnt').textContent = topFiltered.length+' kits';
  const max=topFiltered[0]?topFiltered[0].usage:1;
  const showClientCol = !!searchQuery; // only reveal client/order/usage detail on rows the person actually searched for
  let trows=topFiltered.map((r,i)=>{
    const info = CLIENT_MAP[r.kit];
    let extraCells = '';
    if(showClientCol){
      const daysVal = info && info.daysUntilReset!=null ? info.daysUntilReset+'d' : '\u2014';
      const daysCls = (info && info.daysUntilReset!=null && info.daysUntilReset<=5) ? 'days-badge soon' : 'days-badge';
      const allowanceVal = info && info.monthlyAllowance!=null ? fmt(info.monthlyAllowance,0)+' GB' : '\u2014';
      const remainVal = info && info.gbRemaining!=null ? fmt(info.gbRemaining,1)+' GB' : '\u2014';
      const pctVal = info && info.pctUsed!=null ? info.pctUsed.toFixed(0)+'%' : '\u2014';
      extraCells = `<td class="client-cell">${info&&info.client?info.client:''}</td>
        <td class="ecode">${info&&info.orderNumber?info.orderNumber:''}</td>
        <td class="${daysCls}">${daysVal}</td>
        <td class="num">${allowanceVal}</td>
        <td class="num">${remainVal}</td>
        <td class="num">${pctVal}</td>`;
    }
    return `<tr>
    <td class="rank">${i+1}</td>
    <td class="kit">${r.kit}</td>
    <td class="ecode">${r.ecode||''}</td>
    ${extraCells}
    <td><span class="pill ${r.planGB===50?'p50':'p500'}">${r.plan}</span></td>
    <td style="width:32%"><div class="ubar"><i style="width:${Math.max(4,r.usage/max*100)}%"></i></div></td>
    <td class="num">${fmt(r.usage,1)}</td></tr>`;
  }).join('');
  const clientHeader = showClientCol ? '<th>Client</th><th>Order #</th><th>Reset</th><th>Allowance</th><th>Remaining</th><th>% Used</th>' : '';
  document.getElementById('topWrap').innerHTML=`<table><thead><tr><th>#</th><th>Kit</th><th>ECODE</th>${clientHeader}<th>Plan</th><th>Usage</th><th>GB</th></tr></thead><tbody>${trows}</tbody></table>`;

  document.getElementById('foot').innerHTML='Total '+tb(m.total)+' of '+tb(m.pool)+' pool &middot; '+m.recs.length+' kits';
}
function heroCard(label,val,unit,cls,foot,pct,col,opts){
  const barHtml = (pct!=null) ? `<div class="bar"><i style="width:${pct}%;background:${col}"></i></div>` : '';
  const o = opts||{};
  const extraClass = o.clickable ? ' clickable'+(o.active?' active-filter':'') : '';
  let dataAttr = '';
  if(o.clickable && o.planName!=null) dataAttr += ` data-plan="${o.planName}"`;
  if(o.clickable && o.statusName!=null) dataAttr += ` data-status="${o.statusName}"`;
  return `<div class="card metric${extraClass}"${dataAttr}><div class="label">${label}</div><div class="val ${cls}">${val}${unit?'<span class="u">'+unit+'</span>':''}</div><div class="foot">${foot}</div>${barHtml}</div>`;
}
function sb(k,v){return `<div class="it">${k} <b>${v}</b></div>`;}

// Ask GitHub when a specific file path was last actually pushed (real commit timestamp,
// not anything parsed from the filename). Works correctly no matter how many times a day
// a new file gets uploaded, and regardless of naming convention.
async function lastCommitTime(owner,repo,branch,filePath){
  const api = `https://api.github.com/repos/${owner}/${repo}/commits?path=${encodeURIComponent(filePath)}&sha=${branch}&per_page=1`;
  const commits = await (await fetch(api,{cache:'no-store'})).json();
  if(!Array.isArray(commits) || !commits.length) return -Infinity;
  const dateStr = commits[0]?.commit?.committer?.date || commits[0]?.commit?.author?.date;
  return dateStr ? new Date(dateStr).getTime() : -Infinity;
}

async function discoverLatestFile(config){
  const {owner,repo,path,branch,fileMatch} = config;
  const api = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
  const listing = await (await fetch(api,{cache:'no-store'})).json();
  if(!Array.isArray(listing)) throw new Error('GitHub API did not return a directory listing');
  const candidates = listing.filter(f=>f.type==='file' && fileMatch.test(f.name));
  if(!candidates.length) throw new Error('No files in repo matched fileMatch pattern');
  if(candidates.length===1) return candidates[0];
  // multiple matches — ask GitHub which one was actually pushed most recently
  const withTimes = await Promise.all(candidates.map(async f=>({
    file:f, t: await lastCommitTime(owner,repo,branch,f.path||f.name)
  })));
  withTimes.sort((a,b)=>b.t-a.t);
  return withTimes[0].file;
}

// Parses the "Data Calculator" tab of the live SharePoint export into the same shape as
// CLIENT_MAP_SNAPSHOT. Column positions match the sample confirmed 7/20/26 — if the sheet's
// layout changes, update COL below rather than guessing blind.
const CALC_SHEET_NAME = 'Data Calculator';
const CALC_HEADER_ROW = 8;   // 0-indexed row containing column titles
const CALC_DATA_START = 9;   // 0-indexed row where actual kit rows begin
const COL = {kit:0, ecode:1, client:2, itssContact:3, contactEmail:4, orderNumber:5,
  billingStart:6, cycleStart:7, nextCycle:8, daysUntilReset:9, monthlyAllowance:10,
  status:12, planAmount:14, usage:15, gbRemaining:17, pctUsed:18, pctRemaining:19};

function excelDateToStr(v){
  if(v==null || v==='') return '';
  if(v instanceof Date) return (v.getMonth()+1)+'/'+v.getDate()+'/'+v.getFullYear();
  if(typeof v==='number'){ const d=new Date(Date.UTC(1899,11,30)+v*86400000); return (d.getUTCMonth()+1)+'/'+d.getUTCDate()+'/'+d.getUTCFullYear(); }
  return String(v);
}

async function fetchLiveClientMap(){
  const latest = await discoverLatestFile(CLIENT_DATA_DIR_AUTO);
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
  const buf = await (await fetch(latest.download_url,{cache:'no-store'})).arrayBuffer();
  const wb = XLSX.read(buf,{type:'array', cellDates:true});
  const ws = wb.Sheets[CALC_SHEET_NAME];
  if(!ws) throw new Error(`Sheet "${CALC_SHEET_NAME}" not found in ${latest.name}`);
  const aoa = XLSX.utils.sheet_to_json(ws,{header:1, raw:true});
  const dataRows = aoa.slice(CALC_DATA_START);

  const byKit = {};
  for(const r of dataRows){
    const kit = r[COL.kit];
    if(!kit) continue;
    const k = String(kit).trim();
    const usage = parseFloat(r[COL.usage]) || 0;
    const existing = byKit[k];
    if(existing && existing._usage >= usage) continue; // keep the higher-usage row when a kit is duplicated
    byKit[k] = {
      client: r[COL.client] ? String(r[COL.client]).trim() : '',
      itssContact: r[COL.itssContact] ? String(r[COL.itssContact]).trim() : '',
      contactEmail: r[COL.contactEmail] ? String(r[COL.contactEmail]).trim() : '',
      orderNumber: r[COL.orderNumber] ? String(r[COL.orderNumber]).trim() : '',
      billingStart: excelDateToStr(r[COL.billingStart]),
      monthlyAllowance: r[COL.monthlyAllowance]!=null ? r[COL.monthlyAllowance] : 0,
      status: r[COL.status] ? String(r[COL.status]).trim() : '',
      daysUntilReset: r[COL.daysUntilReset]!=null ? r[COL.daysUntilReset] : null,
      gbRemaining: r[COL.gbRemaining]!=null ? Math.round(r[COL.gbRemaining]*10)/10 : null,
      pctUsed: r[COL.pctUsed]!=null ? Math.round(r[COL.pctUsed]*1000)/10 : null,
      _usage: usage
    };
  }
  const map = {};
  for(const k in byKit){ const {_usage, ...rest} = byKit[k]; map[k] = rest; }
  console.log('Live client/order data loaded:', Object.keys(map).length, 'kits from', latest.name);
  return map;
}

async function boot(){
  // usage-report load and client/order-data load run independently — either can fail
  // without blocking the other, and each falls back to its own embedded snapshot.
  const usagePromise = (async ()=>{
    try{
      let url = DATA_URL;
      if(!url){
        const latest = await discoverLatestFile(DATA_DIR_AUTO);
        url = latest.download_url;
        console.log('Auto-discovered latest Starlink export:', latest.name);
      }
      if(url.toLowerCase().endsWith('.xlsx')){
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
        const buf=await (await fetch(url,{cache:'no-store'})).arrayBuffer();
        return parseXlsx(buf);
      }else{
        const txt=await (await fetch(url,{cache:'no-store'})).text();
        return parseCsv(txt);
      }
    }catch(e){ console.error('Live usage-report load failed, using embedded snapshot:',e); return EMBEDDED; }
  })();

  const clientPromise = (async ()=>{
    try{
      return await fetchLiveClientMap();
    }catch(e){ console.error('Live client/order data load failed, using embedded snapshot:',e); return CLIENT_MAP_SNAPSHOT; }
  })();

  const [usageData, clientMap] = await Promise.all([usagePromise, clientPromise]);
  CLIENT_MAP = clientMap;
  render(usageData);
}
function loadScript(src){
  if(document.querySelector(`script[src="${src}"]`)) return Promise.resolve(); // already loaded
  return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});
}
function rowsToPayload(header,rows){
  const idx=n=>header.findIndex(h=>String(h).trim().toLowerCase()===n);
  const iKit=idx('kit'),iPlan=idx('plan amount'),iUse=idx('data usage (gb)'),iEcode=idx('ecode');
  const recs=[];
  for(const r of rows){
    const co=String(r[0]||'').trim(); if(co==='Total'||co.startsWith('Applied filters')||!r[iKit])continue;
    const plan=String(r[iPlan]||'').trim();
    recs.push({kit:r[iKit],ecode:(iEcode>=0?String(r[iEcode]||'').trim():''),plan,planGB:PLAN_LIMITS[plan]||0,usage:parseFloat(r[iUse])||0});
  }
  return {billingStart:EMBEDDED.billingStart,billingEnd:EMBEDDED.billingEnd,records:recs};
}
function parseXlsx(buf){const wb=XLSX.read(buf,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});return rowsToPayload(aoa[0],aoa.slice(1));}
function parseCsv(txt){const lines=txt.split(/\r?\n/).filter(l=>l.length);const split=l=>{const o=[];let c='',q=false;for(const ch of l){if(ch==='"')q=!q;else if(ch===','&&!q){o.push(c);c='';}else c+=ch;}o.push(c);return o;};return rowsToPayload(split(lines[0]),lines.slice(1).map(split));}

const searchInputEl = document.getElementById('searchInput');
const searchWrapEl = document.getElementById('searchbarWrap');

function runSearch(){
  searchQuery = searchInputEl.value.trim().toLowerCase();
  searchWrapEl.classList.toggle('has-text', !!searchInputEl.value.trim());
  if(LAST_DATA) render(LAST_DATA);
}

searchInputEl.addEventListener('input', ()=>{
  // only toggles the little X visibility as they type — does NOT filter until Search/Enter
  searchWrapEl.classList.toggle('has-text', !!searchInputEl.value.trim());
});
searchInputEl.addEventListener('keydown', e=>{
  if(e.key==='Enter') runSearch();
});
document.getElementById('searchGo').addEventListener('click', runSearch);
document.getElementById('searchClear').addEventListener('click', ()=>{
  searchInputEl.value=''; searchQuery=''; searchWrapEl.classList.remove('has-text');
  if(LAST_DATA) render(LAST_DATA);
});

boot();
</script>
