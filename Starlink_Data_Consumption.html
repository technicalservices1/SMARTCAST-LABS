<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="Anthony Maio">
<title>Starlink Data Consumption &mdash; SmartSource</title>
<style>
  :root{
    --bg:#0f1117; --panel:#161923; --panel2:#1c2030; --line:#262b3a;
    --txt:#e6e9f0; --mut:#8b93a7; --amber:#f59e0b; --blue:#60a5fa;
    --green:#34d399; --red:#f87171; --violet:#a78bfa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;padding:18px 30px 24px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1460px;margin:0 auto}
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line)}
  .title h1{font-size:23px;font-weight:700;letter-spacing:.2px}
  .title h1 .accent{color:var(--amber)}
  .title .sub{color:var(--mut);font-size:13px;margin-top:4px}
  .meta{text-align:right;font-size:12.5px;color:var(--mut);line-height:1.7}
  .meta b{color:var(--blue);font-weight:600}
  .meta .stamp{color:var(--amber);font-weight:600}

  .hero{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:14px;margin-bottom:12px}
  @media(max-width:1180px){.hero{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:640px){.hero{grid-template-columns:repeat(2,1fr)}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 18px}
  .metric .label{color:var(--mut);font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .metric .val{font-size:27px;font-weight:750;margin-top:6px;letter-spacing:-.5px}
  .metric .val.amber{color:var(--amber)} .metric .val.blue{color:var(--blue)}
  .metric .val.red{color:var(--red)} .metric .val.green{color:var(--green)} .metric .val.violet{color:var(--violet)}
  .metric .val .u{font-size:14px;color:var(--mut);font-weight:600;margin-left:4px}
  .metric .foot{color:var(--mut);font-size:11.5px;margin-top:6px}
  .metric .bar{height:5px;border-radius:4px;background:var(--line);margin-top:11px;overflow:hidden}
  .metric .bar>i{display:block;height:100%}

  .sumbar{display:flex;flex-wrap:wrap;gap:26px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 22px;margin-bottom:14px}
  .sumbar .it{font-size:12.5px;color:var(--mut)}
  .sumbar .it b{color:var(--txt);font-weight:650;font-size:13.5px}
  .sumbar .it .k{color:var(--blue)}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:14px}
  @media(max-width:1080px){.cols{grid-template-columns:1fr}}
  h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--mut);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;justify-content:space-between}
  h2.sec .lbl{display:flex;align-items:center;gap:8px}
  h2.sec .cnt{color:var(--mut);font-weight:600;text-transform:none;letter-spacing:0;font-size:11.5px}
  h2.sec .dot{width:7px;height:7px;border-radius:50%;background:var(--amber)}
  h2.sec .dot.blue{background:var(--blue)} h2.sec .dot.red{background:var(--red)}

  .scrollbox{max-height:390px;overflow-y:auto;border-radius:10px}
  .scrollbox::-webkit-scrollbar{width:8px}
  .scrollbox::-webkit-scrollbar-track{background:transparent}
  .scrollbox::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .scrollbox::-webkit-scrollbar-thumb:hover{background:#333a4d}

  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{position:sticky;top:0;background:var(--panel);z-index:2;text-align:left;color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;border-bottom:1px solid var(--line)}
  td{padding:9px 10px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--panel2)}
  td.kit{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;color:var(--mut)}
  td.ecode{color:var(--mut);font-size:12px;min-width:70px}
  td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:650}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:650}
  .pill.p50{background:rgba(96,165,250,.14);color:var(--blue)}
  .pill.p500{background:rgba(167,139,250,.16);color:var(--violet)}
  .over{color:var(--red);font-weight:700}
  .rank{color:var(--mut);font-weight:700;width:26px}
  .ubar{position:relative;height:20px;background:var(--line);border-radius:5px;overflow:hidden;min-width:90px}
  .ubar>i{position:absolute;left:0;top:0;bottom:0;border-radius:5px;background:linear-gradient(90deg,var(--amber),#fbbf24)}
  .empty{color:var(--mut);font-size:13px;padding:20px;text-align:center}

  footer{margin-top:16px;padding-top:12px;border-top:1px solid var(--line);color:var(--mut);font-size:11.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .reflinks{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px 20px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:12px 28px;align-items:center}
  .reflinks .rl-label{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-right:4px}
  .reflinks a{display:inline-flex;align-items:center;gap:7px;color:var(--blue);font-size:13px;font-weight:600;text-decoration:none;padding:5px 12px;border-radius:8px;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.18);transition:background .15s}
  .reflinks a:hover{background:rgba(96,165,250,.16)}
  .reflinks a svg{width:13px;height:13px;flex-shrink:0}

</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">
      <h1>Starlink <span class="accent">Data Consumption</span></h1>
      <div class="sub">SmartSource fleet usage &mdash; per billing cycle</div>
    </div>
    <div class="meta" id="meta"></div>

  <div class="hero" id="hero"></div>
  <div class="sumbar" id="sumbar"></div>

        <span class="cnt" id="topCnt"></span>
      </h2>
      <div class="scrollbox" id="topWrap"></div>
    </div>
  </div>

  <div class="reflinks">
    <span class="rl-label">Reference</span>

      Starlink Order Tracker
    </a>
  </div>

  <footer>
    <div>Starlink Data Consumption Dashboard &middot; SmartSource Rentals</div>
    <div id="foot"></div>
  </footer>
</div>

function compute(data){
  // normalize every record to the real plan (50 GB) regardless of what the source file says
  // De-duplicate by kit — the source export occasionally lists the same kit twice (a real
  // usage row plus a stray 0 GB phantom row). Keep whichever row has the higher usage.
  const byKit = new Map();
  data.records.forEach(r=>{
    const existing = byKit.get(r.kit);
    if(!existing || r.usage > existing.usage) byKit.set(r.kit, r);
  });
  const recs = [...byKit.values()].map(r=>({...r, plan:'50 GB', planGB:FLEET_PLAN_GB, ecode:ECODE_MAP[r.kit]||r.ecode||''}));
  const total = recs.reduce((s,r)=>s+r.usage,0);
  const pool = recs.length * FLEET_PLAN_GB;
  const active = recs.filter(r=>r.usage>0).length;
  const over = recs.filter(r=>r.planGB>0 && r.usage>r.planGB)
                   .map(r=>({...r,overBy:r.usage-r.planGB}))
                   .sort((a,b)=>b.overBy-a.overBy);
  const top = [...recs].sort((a,b)=>b.usage-a.usage);
  const tiers={};
  recs.forEach(r=>{const k=r.plan||'Other';(tiers[k]=tiers[k]||{n:0,gb:0}); tiers[k].n++; tiers[k].gb+=r.usage;});
  return {recs,total,pool,active,over,top,tiers};
}

function render(data){
  const m=compute(data);
  const bs=new Date(data.billingStart+'T00:00:00'), be=new Date(data.billingEnd+'T00:00:00');
  const opt={month:'short',day:'numeric',year:'numeric'};
  const cycle=bs.toLocaleDateString(undefined,opt)+' \u2013 '+be.toLocaleDateString(undefined,opt);

  document.getElementById('meta').innerHTML =
    'Billing cycle &nbsp;<b>'+cycle+'</b><br>'+
    'Data refreshed &nbsp;<span class="stamp">'+new Date().toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})+'</span>';

  const idle=m.recs.length-m.active;
  const t50=m.tiers['50 GB']||{n:0,gb:0};
  const poolPct = m.pool>0 ? Math.min(100, m.total/m.pool*100) : 0;

  document.getElementById('hero').innerHTML = [
    heroCard('Total Data Consumed', (m.total/1000).toFixed(2), 'TB', 'amber', fmt(m.total,0)+' GB this cycle'),
    heroCard('Data Pool', (m.pool/1000).toFixed(2), 'TB', 'green', fmt(m.pool,0)+' GB allotted &middot; <span style="color:var(--red);font-weight:700">'+poolPct.toFixed(0)+'% used</span>', poolPct, 'var(--green)'),
    heroCard('Active Kits', fmt(m.active), '', 'blue', 'of '+m.recs.length+' provisioned'),
    heroCard('Idle Kits', fmt(idle), '', 'green', '0 GB used this cycle'),
    heroCard('Over Plan', fmt(m.over.length), '', 'red', 'kits past allotment'),
    heroCard('50 GB Plan', fmt(t50.n), 'kits', 'blue', fmt(t50.gb,0)+' GB used this cycle')
  ].join('');

  document.getElementById('sumbar').innerHTML =
    sb('Kits total',m.recs.length)+
    sb('50 GB plans',t50.n)+
    sb('Data pool', tb(m.pool))+
    sb('Avg / active kit', m.active? tb(m.total/m.active):'\u2014')+
    sb('Peak kit', tb(m.top[0]?m.top[0].usage:0));

  document.getElementById('overCnt').textContent = m.over.length+' kits';
  const ow=document.getElementById('overWrap');
  if(!m.over.length){ ow.innerHTML='<div class="empty">No kits over plan allotment this cycle.</div>'; }
  else{
    let rows=m.over.map(r=>`<tr>
      <td class="kit">${r.kit}</td>
      <td class="ecode">${r.ecode||''}</td>
      <td><span class="pill ${r.planGB===50?'p50':'p500'}">${r.plan}</span></td>
      <td class="num">${fmt(r.usage,1)}</td>
      <td class="num over">+${fmt(r.overBy,1)}</td></tr>`).join('');
    ow.innerHTML=`<table><thead><tr><th>Kit</th><th>ECODE</th><th>Plan</th><th>Used (GB)</th><th>Over (GB)</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  document.getElementById('topCnt').textContent = m.top.length+' kits';
  const max=m.top[0]?m.top[0].usage:1;
  let trows=m.top.map((r,i)=>`<tr>
    <td class="rank">${i+1}</td>
    <td class="kit">${r.kit}</td>
    <td class="ecode">${r.ecode||''}</td>
    <td><span class="pill ${r.planGB===50?'p50':'p500'}">${r.plan}</span></td>
    <td style="width:38%"><div class="ubar"><i style="width:${Math.max(4,r.usage/max*100)}%"></i></div></td>
    <td class="num">${fmt(r.usage,1)}</td></tr>`).join('');
  document.getElementById('topWrap').innerHTML=`<table><thead><tr><th>#</th><th>Kit</th><th>ECODE</th><th>Plan</th><th>Usage</th><th>GB</th></tr></thead><tbody>${trows}</tbody></table>`;

  document.getElementById('foot').innerHTML='Total '+tb(m.total)+' of '+tb(m.pool)+' pool &middot; '+m.recs.length+' kits';
}
function heroCard(label,val,unit,cls,foot,pct,col){
  const barHtml = (pct!=null) ? `<div class="bar"><i style="width:${pct}%;background:${col}"></i></div>` : '';
  return `<div class="card metric"><div class="label">${label}</div><div class="val ${cls}">${val}${unit?'<span class="u">'+unit+'</span>':''}</div><div class="foot">${foot}</div>${barHtml}</div>`;
}
function sb(k,v){return `<div class="it">${k} <b>${v}</b></div>`;}

// Ask GitHub when a specific file path was last actually pushed (real commit timestamp,
// not anything parsed from the filename). Works correctly no matter how many times a day
// a new file gets uploaded, and regardless of naming convention.
async function lastCommitTime(owner,repo,branch,filePath){
  const api = `https://api.github.com/repos/${owner}/${repo}/commits?path=${encodeURIComponent(filePath)}&sha=${branch}&per_page=1`;
  const commits = await (await fetch(api,{cache:'no-store'})).json();
  if(!Array.isArray(commits) || !commits.length) return -Infinity;
  const dateStr = commits[0]?.commit?.committer?.date || commits[0]?.commit?.author?.date;
  return dateStr ? new Date(dateStr).getTime() : -Infinity;
}

async function discoverLatestFile(){
  const {owner,repo,path,branch,fileMatch} = DATA_DIR_AUTO;
  const api = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
  const listing = await (await fetch(api,{cache:'no-store'})).json();
  if(!Array.isArray(listing)) throw new Error('GitHub API did not return a directory listing');
  const candidates = listing.filter(f=>f.type==='file' && fileMatch.test(f.name));
  if(!candidates.length) throw new Error('No files in repo matched fileMatch pattern');
  if(candidates.length===1) return candidates[0];
  // multiple matches — ask GitHub which one was actually pushed most recently
  const withTimes = await Promise.all(candidates.map(async f=>({
    file:f, t: await lastCommitTime(owner,repo,branch,f.path||f.name)
  })));
  withTimes.sort((a,b)=>b.t-a.t);
  return withTimes[0].file;
}

async function boot(){
  try{
    let url = DATA_URL;
    if(!url){
      const latest = await discoverLatestFile();
      url = latest.download_url;
      console.log('Auto-discovered latest Starlink export:', latest.name);
    }
    if(url.toLowerCase().endsWith('.xlsx')){
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
      const buf=await (await fetch(url,{cache:'no-store'})).arrayBuffer();
      render(parseXlsx(buf));
    }else{
      const txt=await (await fetch(url,{cache:'no-store'})).text();
      render(parseCsv(txt));
    }
  }catch(e){ console.error('Live load failed, using embedded snapshot:',e); render(EMBEDDED); }
}
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
function rowsToPayload(header,rows){
  const idx=n=>header.findIndex(h=>String(h).trim().toLowerCase()===n);
  const iKit=idx('kit'),iPlan=idx('plan amount'),iUse=idx('data usage (gb)'),iEcode=idx('ecode');
  const recs=[];
  for(const r of rows){
    const co=String(r[0]||'').trim(); if(co==='Total'||co.startsWith('Applied filters')||!r[iKit])continue;
    const plan=String(r[iPlan]||'').trim();
    recs.push({kit:r[iKit],ecode:(iEcode>=0?String(r[iEcode]||'').trim():''),plan,planGB:PLAN_LIMITS[plan]||0,usage:parseFloat(r[iUse])||0});
  }
  return {billingStart:EMBEDDED.billingStart,billingEnd:EMBEDDED.billingEnd,records:recs};
}
function parseXlsx(buf){const wb=XLSX.read(buf,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});return rowsToPayload(aoa[0],aoa.slice(1));}
function parseCsv(txt){const lines=txt.split(/\r?\n/).filter(l=>l.length);const split=l=>{const o=[];let c='',q=false;for(const ch of l){if(ch==='"')q=!q;else if(ch===','&&!q){o.push(c);c='';}else c+=ch;}o.push(c);return o;};return rowsToPayload(split(lines[0]),lines.slice(1).map(split));}

boot();
