<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCast Imaging — Lab Overview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07090f; min-height: 100vh; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .monitor-frame { width: 117.6%; transform: scale(0.85); transform-origin: top left; background: #0f1117; border-radius: 12px; display: flex; flex-direction: column; padding: 20px; }
  .dash-header { display: flex; align-items: center; margin-bottom: 18px; }
  .dash-title { font-size: 24px; font-weight: 600; color: #ffffff; letter-spacing: 0.5px; }
  .dash-subtitle { font-size: 11px; color: #60a5fa; text-transform: uppercase; letter-spacing: 0.8px; margin-top: 3px; }
  .dash-subtitle span { color: #f59e0b; font-weight: 500; }
  .lab-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; flex: 1; min-height: 620px; }
  .lab-card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 14px 18px; display: flex; flex-direction: column; min-height: 360px; }
  .lab-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .lab-name { font-size: 17px; font-weight: 600; color: #e2e8f0; }
  .lab-tag { font-size: 11px; color: #e2e8f0; text-transform: uppercase; letter-spacing: 0.6px; }
  .metric-row { display: flex; justify-content: flex-start; gap: 20px; margin-bottom: 8px; }
  .metric-block { flex: 1 1 0; min-width: 0; max-width: 104px; }
  .metric-block.mid { text-align: left; }
  .metric-block.right { text-align: left; }
  .metric-label { font-size: 11px; color: #e2e8f0; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 2px; }
  .metric-value { font-size: 28px; font-weight: 600; }
  .metric-value.today { color: #34d399; }
  .metric-value.week { color: #60a5fa; }
  .metric-value.month { color: #a78bfa; }
  .metric-value.year { color: #f472b6; }
  .divider { border: none; border-top: 1px solid #2d3148; margin: 6px 0; }
  .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .bottom-label { font-size: 11px; color: #e2e8f0; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 2px; }
  .bottom-value { font-size: 13px; color: #f59e0b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
  .bottom-value.server { color: #60a5fa; }
  .bottom-value.image { font-size: 11px; min-width: 0; max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .server-row { margin-top: 8px; border-top: 1px solid #2d3148; padding-top: 8px; }
  .summary-bar { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 12px 24px; display: flex; align-items: center; height: 75px; }
  .summary-bar + .summary-bar { margin-top: 8px; }
  .summary-divider { width: 1px; background: #2d3148; height: 40px; flex-shrink: 0; }
  .summary-block { text-align: center; flex: 1; padding: 0 12px; }
  .bar-label { flex: 0 0 140px; width: 140px; padding-right: 16px; margin-right: 4px; border-right: 1px solid #2d3148; }
  .bar-label-text { font-size: 12px; font-weight: 600; color: #e2e8f0; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
  .summary-label { font-size: 11px; color: #e2e8f0; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .summary-value { font-size: 28px; font-weight: 600; color: #f59e0b; }
  .summary-value.text { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .error { color: #ef4444; font-size: 13px; text-align: center; padding: 20px; }
  .lab-local { font-size: 14px; color: #f59e0b; letter-spacing: 0.4px; font-weight: 500; }
  .lab-local span { color: #f59e0b; }
  /* Rotation / spotlight mode: the active tile fills the SAME area the 8-tile
     grid normally occupies. Summary bars stay visible. Header unaffected. */
  .monitor-frame.spotlight .lab-grid {
    display: block;  /* single tile takes the whole grid region */
  }
  .monitor-frame.spotlight .lab-card { display: none; }
  .monitor-frame.spotlight .lab-card.spot-active {
    display: flex;
    width: 100%;
    height: 100%;
    min-height: 0;   /* override the 360px grid min so it fills naturally */
    padding: 32px 42px;
    justify-content: space-between;  /* spread content vertically to fill */
  }
  /* Scale up the active tile's contents so it reads from across a room. */
  .monitor-frame.spotlight .lab-card.spot-active .lab-name { font-size: 34px; }
  .monitor-frame.spotlight .lab-card.spot-active .lab-local { font-size: 24px; }
  .monitor-frame.spotlight .lab-card.spot-active .lab-tag { font-size: 18px; }
  .monitor-frame.spotlight .lab-card.spot-active .metric-label { font-size: 18px; margin-bottom: 6px; }
  .monitor-frame.spotlight .lab-card.spot-active .metric-value { font-size: 64px; }
  .monitor-frame.spotlight .lab-card.spot-active .metric-row { justify-content: space-between; gap: 0; }
  .monitor-frame.spotlight .lab-card.spot-active .metric-block { width: auto; flex: 1; min-width: 0; max-width: none; }
  .monitor-frame.spotlight .lab-card.spot-active .metric-block.mid { text-align: center; }
  .monitor-frame.spotlight .lab-card.spot-active .metric-block.right { text-align: right; }
  .monitor-frame.spotlight .lab-card.spot-active .bottom-label { font-size: 16px; margin-bottom: 4px; }
  .monitor-frame.spotlight .lab-card.spot-active .bottom-value { font-size: 26px; }
  .monitor-frame.spotlight .lab-card.spot-active .bottom-value.image { font-size: 20px; }
  .monitor-frame.spotlight .lab-card.spot-active .divider { margin: 14px 0; }
  /* Give the internal stacked blocks a little more breathing room when enlarged */
  .monitor-frame.spotlight .lab-card.spot-active > div { margin-top: 10px !important; padding-top: 14px !important; }
  .monitor-frame.spotlight .lab-card.spot-active > .lab-header { margin-top: 0 !important; padding-top: 0 !important; }
  /* Fade layer applied to grid and cards */
  .lab-grid.fade-out, .lab-card.fade-out { opacity: 0; }
  .lab-grid, .lab-card { transition: opacity 0.5s ease-in-out; }
  .summary-bar-wrap { transition: opacity 0.5s ease-in-out; }
  .summary-bar-wrap.fade-out { opacity: 0; }
</style>
</head>
<body>
<div class="monitor-frame">
  <div class="dash-header" style="justify-content:space-between;">
    <div>
      <div class="dash-title">SmartCast Imaging — Lab Overview</div>
      <div class="dash-subtitle">Most Recent Entry: <span id="lastEntryDisplay">--</span></div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:11px;color:#e2e8f0;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px;">Local Date & Time</div>
      <div id="clockDisplay" style="font-size:18px;font-weight:600;color:#ffffff;"></div>
    </div>
  </div>
  <div class="lab-grid" id="labGrid">
    <div style="color:#6b7280;font-size:14px;padding:20px;">Loading data...</div>
  </div>
  <div class="summary-bar-wrap" style="margin-top:14px;">
    <div class="summary-bar" id="summaryBar1"></div>
    <div class="summary-bar" id="summaryBar2"></div>
    <div class="summary-bar" id="summaryBar3"></div>
  </div>
</div>

<script>
const GITHUB_OWNER = 'technicalservices1';
const GITHUB_REPO = 'SMARTCAST-LABS';
const GITHUB_FILE = 'SmartCast Imaging Log.csv';
const LABS = ['LA', 'LV', 'CH', 'DAL', 'ENG', 'HAU', 'ATL', 'ORL'];

// Rotation state — declared early so buildDashboard() can safely check it
// on the very first render (before the rotation engine block runs).
let rotationTimer = null;
let rotationIndex = -1; // -1 = overview, 0..n = tile index in LABS
const EXCLUDED = ['TEST', 'DC', 'PRODUCTIONSC'];

// Per-branch IANA timezones for the local-time clock on each tile.
// IANA ids handle daylight saving automatically.
const LAB_TZ = {
  LA:  'America/Los_Angeles',
  LV:  'America/Los_Angeles',
  CH:  'America/Chicago',
  DAL: 'America/Chicago',
  ENG: 'America/New_York',
  HAU: 'America/New_York',
  ATL: 'America/New_York',
  ORL: 'America/New_York'
};

function localTimeFor(lab) {
  const tz = LAB_TZ[lab];
  if (!tz) return '';
  try {
    return new Intl.DateTimeFormat('en-US', {
      timeZone: tz, hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true
    }).format(new Date());
  } catch (e) {
    return '';
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = line.split(',').map(v => v.trim().replace(/"/g, ''));
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

function getLocation(serverName) {
  return (serverName || '').split('-')[0];
}

function normalizeDate(dateStr) {
  if (!dateStr) return '';
  // Handle YYYYMMDD (no separators) → YYYY-MM-DD
  if (/^\d{8}$/.test(dateStr.trim())) {
    const s = dateStr.trim();
    return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  }
  // Handle M/D/YYYY or MM/DD/YYYY → YYYY-MM-DD
  const slash = dateStr.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (slash) {
    return `${slash[3]}-${slash[1].padStart(2,'0')}-${slash[2].padStart(2,'0')}`;
  }
  // Already YYYY-MM-DD or similar — return as-is
  return dateStr.trim();
}

// Safari-safe date builder. Safari's Date parser rejects strings like
// '2026-06-18 4:24 PM', so we construct the Date from explicit numeric parts.
function buildDate(rawDateStr, timeStr) {
  const dateStr = normalizeDate(rawDateStr || '');
  if (!dateStr) return null;
  const dm = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!dm) {
    const fallback = new Date(dateStr);
    return isNaN(fallback) ? null : fallback;
  }
  const year = parseInt(dm[1]), month = parseInt(dm[2]) - 1, day = parseInt(dm[3]);
  let h = 0, m = 0, s = 0;
  const tm = (timeStr || '').match(/(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)?/i);
  if (tm) {
    h = parseInt(tm[1]); m = parseInt(tm[2]); s = parseInt(tm[3] || 0);
    const ampm = tm[4];
    if (ampm) {
      if (ampm.toUpperCase() === 'PM' && h !== 12) h += 12;
      if (ampm.toUpperCase() === 'AM' && h === 12) h = 0;
    }
  }
  const d = new Date(year, month, day, h, m, s);
  return isNaN(d) ? null : d;
}

function parseRowDate(row) {
  return buildDate(row['Date'] || '', row['StartTime'] || '');
}

function isToday(row) {
  const d = parseRowDate(row);
  if (!d) return false;
  const now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
}

function isRecent(row, days) {
  const d = parseRowDate(row);
  if (!d) return false;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  return d >= cutoff;
}

function topValue(rows, field, weightField) {
  const counts = {};
  rows.forEach(r => {
    const key = r[field];
    if (!key) return;
    counts[key] = (counts[key] || 0) + (parseInt(r[weightField]) || 1);
  });
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0]?.[0] || '--';
}

function topServer(rows) {
  const counts = {};
  rows.forEach(r => {
    const key = r['ServerName'];
    if (!key) return;
    counts[key] = (counts[key] || 0) + 1;
  });
  const top = Object.entries(counts).sort((a,b) => b[1]-a[1])[0];
  return top ? `${top[0]} (${top[1]})` : '--';
}

function parseTime(t) {
  if (!t) return null;
  const match = t.match(/(\d+):(\d+)(?::(\d+))?\s*(AM|PM)?/i);
  if (!match) return null;
  let h = parseInt(match[1]), m = parseInt(match[2]), s = parseInt(match[3] || 0);
  const ampm = match[4];
  if (ampm) {
    if (ampm.toUpperCase() === 'PM' && h !== 12) h += 12;
    if (ampm.toUpperCase() === 'AM' && h === 12) h = 0;
  }
  return h * 3600 + m * 60 + s;
}

function avgSessionTime(rows) {
  const durations = [];
  rows.forEach(r => {
    const dateStr = r['Date'] || '';
    if (!dateStr) return;
    const start = buildDate(dateStr, r['StartTime'] || '');
    const finish = buildDate(dateStr, r['FinishTime'] || '');
    if (start && finish && finish > start) {
      durations.push((finish - start) / 60000);
    }
  });
  if (!durations.length) return '--';
  return Math.round(durations.reduce((a, b) => a + b, 0) / durations.length) + ' min';
}

function avgClientCount(rows) {
  if (!rows.length) return '--';
  return Math.round(rows.reduce((s, r) => s + (parseInt(r['ClientCount']) || 0), 0) / rows.length).toString();
}

function avgImageSize(rows) {
  // Average WIM size in GB. Strips non-numeric (handles "15.4GB" or "15.4").
  const sizes = [];
  rows.forEach(r => {
    const raw = (r['ImageSize'] || '').replace(/[^0-9.]/g, '');
    const val = parseFloat(raw);
    if (!isNaN(val) && val > 0) sizes.push(val);
  });
  if (!sizes.length) return '--';
  return (sizes.reduce((a, b) => a + b, 0) / sizes.length).toFixed(1) + ' GB';
}

function gigsPushed(rows) {
  // Total GB pushed = sum of (ImageSize GB * ClientCount) across rows.
  let total = 0;
  rows.forEach(r => {
    const raw = (r['ImageSize'] || '').replace(/[^0-9.]/g, '');
    const size = parseFloat(raw);
    const clients = parseInt(r['ClientCount']) || 0;
    if (!isNaN(size) && size > 0 && clients > 0) total += size * clients;
  });
  return total; // in GB
}

function formatGB(totalGB) {
  // Auto-scale GB -> TB -> PB -> EB.
  if (!totalGB || totalGB <= 0) return '0 GB';
  const units = ['GB', 'TB', 'PB', 'EB'];
  let value = totalGB, i = 0;
  while (value >= 1024 && i < units.length - 1) { value /= 1024; i++; }
  const formatted = i === 0 ? Math.round(value).toLocaleString() : value.toFixed(1);
  return `${formatted} ${units[i]}`;
}

function buildDashboard(data) {
  const filtered = data.filter(r => !EXCLUDED.includes(getLocation(r['ServerName'] || '')));

  // Last entry timestamp — skip excluded servers and unparseable dates
  const lastRow = [...data].reverse().find(r => {
    const loc = getLocation(r['ServerName'] || '');
    return !EXCLUDED.includes(loc) && parseRowDate(r) !== null;
  });
  if (lastRow) {
    const d = parseRowDate(lastRow);
    const lab = getLocation(lastRow['ServerName'] || '') || '--';
    if (d) {
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      let h = d.getHours(), m = d.getMinutes().toString().padStart(2,'0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      const label = `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} · ${h}:${m} ${ampm} — ${lab}`;
      document.getElementById('lastEntryDisplay').textContent = label;
    }
  }
  const labGrid = document.getElementById('labGrid');
  labGrid.innerHTML = '';

  let combined7 = 0, combined30 = 0, combined365 = 0;
  let combinedPushed7 = 0, combinedPushed30 = 0, combinedPushed365 = 0;
  const labTotals7 = {}, labTotals30 = {}, labTotals365 = {};

  LABS.forEach(lab => {
    const labRows = filtered.filter(r => getLocation(r['ServerName'] || '') === lab);
    const rowsToday = labRows.filter(r => isToday(r));
    const rows7 = labRows.filter(r => isRecent(r, 7));
    const rows30 = labRows.filter(r => isRecent(r, 30));
    const rows365 = labRows.filter(r => isRecent(r, 365));

    const totalToday = rowsToday.reduce((s, r) => s + (parseInt(r['ClientCount']) || 0), 0);
    const total7 = rows7.reduce((s, r) => s + (parseInt(r['ClientCount']) || 0), 0);
    const total30 = rows30.reduce((s, r) => s + (parseInt(r['ClientCount']) || 0), 0);
    const total365 = rows365.reduce((s, r) => s + (parseInt(r['ClientCount']) || 0), 0);

    combined7 += total7;
    combined30 += total30;
    combined365 += total365;
    labTotals7[lab] = total7;
    labTotals30[lab] = total30;
    labTotals365[lab] = total365;

    const topModel = topValue(rows7, 'Model', 'ClientCount');
    const topImage = topValue(rows7, 'ImageName', 'ClientCount');
    const topSrv = topServer(rows7);
    const avgTime = avgSessionTime(rows7);
    const avgClients = avgClientCount(rows7);
    const avgSize7 = avgImageSize(rows7);
    const avgSizeAll = avgImageSize(labRows);
    const pushed7 = gigsPushed(rows7);
    const pushed30 = gigsPushed(rows30);
    const pushed365 = gigsPushed(rows365);

    combinedPushed7 += pushed7;
    combinedPushed30 += pushed30;
    combinedPushed365 += pushed365;

    const card = document.createElement('div');
    card.className = 'lab-card';
    card.innerHTML = `
      <div class="lab-header">
        <div style="display:flex;align-items:baseline;gap:10px;min-width:0;">
          <div class="lab-name">${lab}</div>
          <div class="lab-local"><span class="lab-local-time" data-lab="${lab}">${localTimeFor(lab)}</span></div>
        </div>
        <div class="lab-tag">Machines Imaged</div>
      </div>
      <div class="metric-row">
        <div class="metric-block">
          <div class="metric-label">Today</div>
          <div class="metric-value today">${totalToday}</div>
        </div>
        <div class="metric-block mid">
          <div class="metric-label">Last 7 Days</div>
          <div class="metric-value week">${total7}</div>
        </div>
        <div class="metric-block mid">
          <div class="metric-label">Last 30 Days</div>
          <div class="metric-value month">${total30}</div>
        </div>
        <div class="metric-block right">
          <div class="metric-label">Last 365 Days</div>
          <div class="metric-value year">${total365}</div>
        </div>
      </div>
      <hr class="divider">
      <div class="bottom-row">
        <div><div class="bottom-label">Most Used Model (7D)</div><div class="bottom-value">${topModel}</div></div>
        <div><div class="bottom-label">Top Server (Sessions) (7D)</div><div class="bottom-value server">${topSrv}</div></div>
      </div>
      <div style="margin-top:6px;border-top:1px solid #2d3148;padding-top:6px;">
        <div class="bottom-label">Most Used Image (7D)</div>
        <div class="bottom-value image">${topImage}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;border-top:1px solid #2d3148;padding-top:6px;">
        <div><div class="bottom-label">Avg Session (7D)</div><div class="bottom-value">${avgTime}</div></div>
        <div><div class="bottom-label">Avg Clients (7D)</div><div class="bottom-value">${avgClients}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;border-top:1px solid #2d3148;padding-top:6px;">
        <div><div class="bottom-label">Avg Size (7D)</div><div class="bottom-value">${avgSize7}</div></div>
        <div><div class="bottom-label">Avg Size (All-Time)</div><div class="bottom-value">${avgSizeAll}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px;border-top:1px solid #2d3148;padding-top:6px;">
        <div><div class="bottom-label">Data Pushed (7D)</div><div class="bottom-value" style="color:#34d399;">${formatGB(pushed7)}</div></div>
        <div><div class="bottom-label">Data Pushed (30D)</div><div class="bottom-value" style="color:#34d399;">${formatGB(pushed30)}</div></div>
        <div><div class="bottom-label">Data Pushed (365D)</div><div class="bottom-value" style="color:#34d399;">${formatGB(pushed365)}</div></div>
      </div>
    `;
    labGrid.appendChild(card);
  });

  // If a rotation is active and the grid was just rebuilt by a background
  // data refresh, re-apply the current spotlight stage so the view doesn't jump.
  if (rotationIndex >= 0) {
    const cards = labGrid.querySelectorAll('.lab-card');
    cards.forEach(c => c.classList.remove('spot-active'));
    if (cards[rotationIndex]) cards[rotationIndex].classList.add('spot-active');
  }

  const topLab7 = Object.entries(labTotals7).sort((a,b) => b[1]-a[1])[0];
  const topLab30 = Object.entries(labTotals30).sort((a,b) => b[1]-a[1])[0];
  const topLab365 = Object.entries(labTotals365).sort((a,b) => b[1]-a[1])[0];
  const topModel = topValue(filtered, 'Model', 'ClientCount');
  const topSrvAll = topServer(filtered);

  document.getElementById('summaryBar1').innerHTML = `
    <div class="bar-label"><div class="bar-label-text">All Labs Imaged</div></div>
    <div class="summary-block">
      <div class="summary-label">Last 7 Days</div>
      <div class="summary-value">${combined7}</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-block">
      <div class="summary-label">Last 30 Days</div>
      <div class="summary-value">${combined30}</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-block">
      <div class="summary-label">Last 365 Days</div>
      <div class="summary-value">${combined365}</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-block">
      <div class="summary-label">Most Used Model (To Date)</div>
      <div class="summary-value text">${topModel}</div>
    </div>
  `;

  document.getElementById('summaryBar2').innerHTML = `
    <div class="bar-label"><div class="bar-label-text">Lab Leaders</div></div>
    <div class="summary-block">
      <div style="font-size:36px;font-weight:700;color:#f59e0b;">${topLab7 && topLab7[1] > 0 ? topLab7[0] : '--'}</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-block">
      <div style="font-size:36px;font-weight:700;color:#f59e0b;">${topLab30 && topLab30[1] > 0 ? topLab30[0] : '--'}</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-block">
      <div style="font-size:36px;font-weight:700;color:#f59e0b;">${topLab365 && topLab365[1] > 0 ? topLab365[0] : '--'}</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-block">
      <div class="summary-label">Top Server (Sessions) (To Date)</div>
      <div class="summary-value text" style="color:#60a5fa;">${topSrvAll}</div>
    </div>
  `;

  const combinedPushedAll = gigsPushed(filtered);
  document.getElementById('summaryBar3').innerHTML = `
    <div class="bar-label"><div class="bar-label-text">All Labs Pushed</div></div>
    <div class="summary-block">
      <div class="summary-label">Last 7 Days</div>
      <div class="summary-value" style="color:#34d399;">${formatGB(combinedPushed7)}</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-block">
      <div class="summary-label">Last 30 Days</div>
      <div class="summary-value" style="color:#34d399;">${formatGB(combinedPushed30)}</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-block">
      <div class="summary-label">Last 365 Days</div>
      <div class="summary-value" style="color:#34d399;">${formatGB(combinedPushed365)}</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-block">
      <div class="summary-label">All-Time</div>
      <div class="summary-value" style="color:#34d399;">${formatGB(combinedPushedAll)}</div>
    </div>
  `;
}

async function loadData() {
  try {
    const rawUrl = `https://raw.githubusercontent.com/technicalservices1/SMARTCAST-LABS/main/SmartCast%20Imaging%20Log.csv`;
    const res = await fetch(rawUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    buildDashboard(parseCSV(text));
  } catch(e) {
    document.getElementById('labGrid').innerHTML = `<div class="error">Error loading data: ${e.message}<br>Check the repo path and that the CSV is public.</div>`;
  }
}

loadData();
setInterval(loadData, 300000);

function updateClock() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const day = days[now.getDay()];
  const month = months[now.getMonth()];
  const date = now.getDate();
  const year = now.getFullYear();
  let hours = now.getHours();
  const minutes = now.getMinutes().toString().padStart(2, '0');
  const ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12 || 12;
  const seconds = now.getSeconds().toString().padStart(2, '0');
  document.getElementById('clockDisplay').textContent = `${day}, ${month} ${date}, ${year} · ${hours}:${minutes}:${seconds} ${ampm}`;
}
updateClock();
setInterval(updateClock, 1000);

// Keep each tile's local-time clock current (updates the minute display every 15s).
function updateLabClocks() {
  document.querySelectorAll('.lab-local-time').forEach(el => {
    const lab = el.getAttribute('data-lab');
    const t = localTimeFor(lab);
    if (t) el.textContent = t;
  });
}
setInterval(updateLabClocks, 1000);

/* ---------- Rotation / spotlight engine ----------
   Sequence: full overview for OVERVIEW_MS, then each branch tile for TILE_MS,
   scaled up + centered, fading between slides. Loops forever.
   Hover anywhere pauses; leaving resumes. Data keeps refreshing in the
   background (setInterval(loadData,...)) independently of the rotation. */
const OVERVIEW_MS = 90000;  // 90 seconds
const TILE_MS = 30000;      // 30 seconds per tile
const FADE_MS = 500;

function frameEl() { return document.querySelector('.monitor-frame'); }
function gridEl() { return document.getElementById('labGrid'); }

function showOverview() {
  const frame = frameEl();
  frame.classList.remove('spotlight');
  gridEl().querySelectorAll('.lab-card').forEach(c => c.classList.remove('spot-active'));
}

function showTile(i) {
  const frame = frameEl();
  frame.classList.add('spotlight');
  const cards = gridEl().querySelectorAll('.lab-card');
  cards.forEach(c => c.classList.remove('spot-active'));
  if (cards[i]) cards[i].classList.add('spot-active');
}

function applyStage() {
  // Fade only the grid region out, swap the stage, fade back in.
  // Summary bars stay visible at all times.
  const grid = gridEl();
  grid.classList.add('fade-out');
  setTimeout(() => {
    if (rotationIndex < 0) showOverview();
    else showTile(rotationIndex);
    grid.classList.remove('fade-out');
  }, FADE_MS);
}

function scheduleNext() {
  clearTimeout(rotationTimer);
  const dwell = (rotationIndex < 0) ? OVERVIEW_MS : TILE_MS;
  rotationTimer = setTimeout(() => {
    // advance: overview(-1) -> 0 -> 1 -> ... -> last -> overview(-1)
    rotationIndex = (rotationIndex + 1 >= LABS.length) ? -1 : rotationIndex + 1;
    applyStage();
    scheduleNext();
  }, dwell);
}

function startRotation() {
  rotationIndex = -1;
  showOverview();
  scheduleNext();
}

// Kick off the rotation once the first data render has had a moment to build cards.
setTimeout(startRotation, 1500);
</script>
