<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCast Imaging — Lab Overview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07090f; min-height: 100vh; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .monitor-frame { width: 117.6%; transform: scale(0.85); transform-origin: top left; background: #0f1117; border-radius: 12px; display: flex; flex-direction: column; padding: 20px; }
  .dash-header { display: flex; align-items: center; margin-bottom: 18px; }
  .dash-title { font-size: 24px; font-weight: 600; color: #ffffff; letter-spacing: 0.5px; }
  .dash-since { font-size: 15px; font-weight: 400; color: #94a3b8; letter-spacing: 0.3px; }
  .dash-subtitle { font-size: 11px; color: #60a5fa; text-transform: uppercase; letter-spacing: 0.8px; margin-top: 3px; }
  .dash-subtitle span { color: #f59e0b; font-weight: 500; }
  .lab-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; flex: 1; min-height: 620px; }
  .lab-card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 14px 18px; display: flex; flex-direction: column; min-height: 360px; }
  .lab-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .lab-name { font-size: 17px; font-weight: 600; color: #e2e8f0; }
  .lab-tag { font-size: 11px; color: #e2e8f0; text-transform: uppercase; letter-spacing: 0.6px; }
  .lab-status { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; }
  .lab-status .status-dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
  .lab-status.active { color: #34d399; }
  .lab-status.active .status-dot { background: #34d399; box-shadow: 0 0 6px #34d399; }
  .lab-status.inactive { color: #ef4444; }
  .lab-status.inactive .status-dot { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.65); }
  .lab-status .status-window { color: #64748b; font-weight: 500; font-size: 10px; }
  .metric-row { display: flex; justify-content: flex-start; gap: 20px; margin-bottom: 8px; }
  .metric-block { flex: 1 1 0; min-width: 0; max-width: 104px; }
  .metric-block.mid { text-align: left; }
  .metric-block.right { text-align: left; }
  .metric-label { font-size: 11px; color: #e2e8f0; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 2px; }
  .metric-value { font-size: 28px; font-weight: 600; }
  .metric-value.today { color: #34d399; }
  .metric-value.week { color: #60a5fa; }
  .metric-value.month { color: #a78bfa; }
  .metric-value.year { color: #f472b6; }
  .divider { border: none; border-top: 1px solid #2d3148; margin: 6px 0; }
  .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .bottom-label { font-size: 11px; color: #e2e8f0; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 2px; }
  .bottom-value { font-size: 13px; color: #f59e0b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
  .bottom-value.server { color: #60a5fa; }
  .bottom-value.image { font-size: 11px; min-width: 0; max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .server-row { margin-top: 8px; border-top: 1px solid #2d3148; padding-top: 8px; }
  .summary-bar { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 12px 24px; display: flex; align-items: center; height: 75px; }
  .summary-bar + .summary-bar { margin-top: 0; }
  .summary-bar-wrap { display: grid; grid-template-columns: 1fr minmax(340px, 26%); gap: 8px; align-items: stretch; }
  .summary-stack { display: grid; grid-template-rows: repeat(3, 75px); gap: 8px; min-width: 0; }
  .summary-side { grid-column: 2; background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px;
                  padding: 12px 18px; display: flex; flex-direction: column; min-width: 0; }
  .side-hdr { display: flex; align-items: baseline; justify-content: space-between; }
  .side-ttl { font-size: 11px; color: #e2e8f0; text-transform: uppercase; letter-spacing: .7px; font-weight: 600; }
  .side-et { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: .6px; }
  .side-stat { display: flex; align-items: baseline; gap: 9px; margin: 8px 0 12px; }
  .side-big { font-size: 28px; font-weight: 600; color: #f59e0b; line-height: 1; }
  .side-sub { font-size: 11px; color: #94a3b8; letter-spacing: .3px; }
  .side-rows { flex: 1; display: flex; flex-direction: column; gap: 7px; min-height: 0; }
  .side-row { flex: 1; display: flex; align-items: flex-end; gap: 10px; min-height: 0; }
  .side-zl { width: 56px; font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: .6px; text-align: right; line-height: 1; padding-bottom: 1px; }
  .side-cols { flex: 1; align-self: stretch; display: flex; gap: 1px; align-items: flex-end; min-width: 0; }
  .side-c { flex: 1; border-radius: 1px; }
  .side-axis { display: flex; margin-left: 66px; margin-top: 6px; }
  .side-axis span { flex: 1; font-size: 9px; color: #64748b; text-align: left; }
  .summary-side { cursor: pointer; transition: border-color .2s ease; }
  .summary-side:hover { border-color: #3d4358; }
  .zone-block { padding: 15px 0; border-bottom: 1px solid #1a1f2e; }
  .zone-block:last-child { border-bottom: none; }
  .zone-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  .zone-name { font-size: 15px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
  .zone-labs { font-size: 11px; color: #64748b; letter-spacing: .4px; margin-top: 3px; }
  .zone-stat { text-align: right; }
  .zone-range { font-size: 21px; font-weight: 600; color: #f59e0b; line-height: 1; }
  .zone-sub { font-size: 11px; color: #94a3b8; margin-top: 4px; }
  .zone-chart { height: 74px; display: flex; gap: 2px; align-items: flex-end; }
  .zc { flex: 1; border-radius: 2px; }
  .zone-axis { display: flex; margin-top: 5px; }
  .zone-axis span { flex: 1; font-size: 10px; color: #64748b; }
  .summary-divider { width: 1px; background: #2d3148; height: 40px; flex-shrink: 0; }
  .summary-block { text-align: center; flex: 1; padding: 0 12px; }
  .bar-label { flex: 0 0 140px; width: 140px; padding-right: 16px; margin-right: 4px; border-right: 1px solid #2d3148; }
  .bar-label-text { font-size: 12px; font-weight: 600; color: #e2e8f0; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
  .summary-label { font-size: 11px; color: #e2e8f0; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .summary-value { font-size: 28px; font-weight: 600; color: #f59e0b; }
  .summary-value.text { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .error { color: #ef4444; font-size: 13px; text-align: center; padding: 20px; }
  .lab-local { font-size: 14px; color: #f59e0b; letter-spacing: 0.4px; font-weight: 500; }
  .lab-local span { color: #f59e0b; }
  /* Rotation / spotlight mode: the active tile fills the SAME area the 8-tile
     grid normally occupies. Summary bars stay visible. Header unaffected. */
  .monitor-frame.spotlight .lab-grid {
    display: block;  /* single tile takes the whole grid region */
  }
  .monitor-frame.spotlight .lab-card { display: none; }
  .monitor-frame.spotlight .lab-card.spot-active {
    display: flex;
    width: 100%;
    height: 100%;
    min-height: 0;   /* override the 360px grid min so it fills naturally */
    padding: 32px 42px;
    justify-content: space-between;  /* spread content vertically to fill */
  }
  /* Scale up the active tile's contents so it reads from across a room. */
  .monitor-frame.spotlight .lab-card.spot-active .lab-name { font-size: 34px; }
  .monitor-frame.spotlight .lab-card.spot-active .lab-local { font-size: 24px; }
  .monitor-frame.spotlight .lab-card.spot-active .lab-tag { font-size: 18px; }
  .monitor-frame.spotlight .lab-card.spot-active .lab-status { font-size: 18px; gap: 9px; }
  .monitor-frame.spotlight .lab-card.spot-active .lab-status .status-dot { width: 16px; height: 16px; }
  .monitor-frame.spotlight .lab-card.spot-active .lab-status .status-window { font-size: 15px; }
  .monitor-frame.spotlight .lab-card.spot-active .metric-label { font-size: 18px; margin-bottom: 6px; }
  .monitor-frame.spotlight .lab-card.spot-active .metric-value { font-size: 64px; }
  .monitor-frame.spotlight .lab-card.spot-active .metric-row { justify-content: space-between; gap: 0; }
  .monitor-frame.spotlight .lab-card.spot-active .metric-block { width: auto; flex: 1; min-width: 0; max-width: none; }
  .monitor-frame.spotlight .lab-card.spot-active .metric-block.mid { text-align: center; }
  .monitor-frame.spotlight .lab-card.spot-active .metric-block.right { text-align: right; }
  .monitor-frame.spotlight .lab-card.spot-active .bottom-label { font-size: 16px; margin-bottom: 4px; }
  .monitor-frame.spotlight .lab-card.spot-active .bottom-value { font-size: 26px; }
  .monitor-frame.spotlight .lab-card.spot-active .bottom-value.image { font-size: 20px; }
  .monitor-frame.spotlight .lab-card.spot-active .divider { margin: 14px 0; }
  /* Give the internal stacked blocks a little more breathing room when enlarged */
  .monitor-frame.spotlight .lab-card.spot-active > div { margin-top: 10px !important; padding-top: 14px !important; }
  .monitor-frame.spotlight .lab-card.spot-active > .lab-header { margin-top: 0 !important; padding-top: 0 !important; }
  /* Fade layer applied to grid and cards */
  .lab-grid.fade-out, .lab-card.fade-out { opacity: 0; }
  .lab-grid, .lab-card { transition: opacity 0.5s ease-in-out; }
  .summary-bar-wrap { transition: opacity 0.5s ease-in-out; }
  .summary-bar-wrap.fade-out { opacity: 0; }
  /* Click-through session panel */
  .lab-card { cursor: pointer; }
  .lab-panel-overlay { position: fixed; inset: 0; background: rgba(3,5,10,0.78); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .lab-panel { background: #0d1119; border: 1px solid #2d3148; border-radius: 12px; width: min(1100px, 92vw); max-height: 86vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
  .lab-panel-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #2d3148; }
  .lab-panel-title { font-size: 18px; font-weight: 700; color: #ffffff; letter-spacing: 0.4px; }
  .lab-panel-stamp { font-size: 11px; color: #64748b; margin-top: 3px; letter-spacing: 0.3px; }
  .lab-panel-close { background: #1e2433; color: #e2e8f0; border: 1px solid #2d3148; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.4px; }
  .lab-panel-close:hover { background: #2a3145; }
  .lab-panel-body { overflow: auto; padding: 8px 20px 18px; }
  .lab-panel-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .lab-panel-table th { text-align: left; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.6px; font-size: 11px; font-weight: 600; padding: 10px 12px; border-bottom: 1px solid #2d3148; position: sticky; top: 0; background: #0d1119; }
  .lab-panel-table th.num { text-align: right; }
  .lab-panel-table td { color: #e2e8f0; padding: 9px 12px; border-bottom: 1px solid #1a1f2e; white-space: nowrap; }
  .lab-panel-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .lab-panel-table td.img { max-width: 340px; overflow: hidden; text-overflow: ellipsis; }
  .lab-panel-table tbody tr:hover { background: #141a26; }
  .lab-panel-empty { color: #94a3b8; padding: 30px; text-align: center; font-size: 15px; }
</style>
</head>
<body>
<div class="monitor-frame">
  <div class="dash-header" style="justify-content:space-between;">
    <div>
      <div class="dash-title">SmartCast Imaging — Lab Overview<span class="dash-since" id="recordingSince"></span></div>
      <div class="dash-subtitle">Most Recent Entry: <span id="lastEntryDisplay">--</span></div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:11px;color:#e2e8f0;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px;">Local Date & Time</div>
      <div id="clockDisplay" style="font-size:18px;font-weight:600;color:#ffffff;"></div>
    </div>
  </div>
  <div class="lab-grid" id="labGrid">
    <div style="color:#6b7280;font-size:14px;padding:20px;">Loading data...</div>
  </div>
  <div class="summary-bar-wrap" style="margin-top:14px;">
    <div class="summary-stack">
      <div class="summary-bar" id="summaryBar1"></div>
      <div class="summary-bar" id="summaryBar2"></div>
      <div class="summary-bar" id="summaryBar3"></div>
    </div>
    <div class="summary-side" id="summarySide"></div>
  </div>
</div>

<div id="labPanel" class="lab-panel-overlay" style="display:none;">
  <div class="lab-panel">
    <div class="lab-panel-head">
      <div>
        <div class="lab-panel-title" id="labPanelTitle"></div>
        <div class="lab-panel-stamp" id="labPanelStamp"></div>
      </div>
      <button class="lab-panel-close" id="labPanelClose">✕ Clear</button>
    </div>
    <div class="lab-panel-body" id="labPanelBody"></div>
  </div>
</div>

<script>
const GITHUB_OWNER = 'technicalservices1';
const GITHUB_REPO = 'SMARTCAST-LABS';
const GITHUB_FILE = 'SmartCast Imaging Log.csv';
const LABS = ['LA', 'LV', 'CH', 'DAL', 'ENG', 'HAU', 'ATL', 'ORL'];

// Rotation state — declared early so buildDashboard() can safely check it
// on the very first render (before the rotation engine block runs).
let rotationTimer = null;
let rotationPaused = false;
let latestFiltered = [];
let panelOpenLab = null;
let panelMode = null;   // 'lab' | 'zones'
let lastLoadTime = null;
let rotationIndex = -1; // -1 = overview, 0..n = tile index in LABS
const EXCLUDED = ['TEST', 'DC', 'PRODUCTIONSC'];

// Branch shows ACTIVE if its most recent session finished within this many minutes (branch-local time).
const ACTIVE_WINDOW_MIN = 60;

// Number of most-recent sessions shown when a lab tile is clicked.
const SESSION_LIST_COUNT = 30;

// Per-branch IANA timezones for the local-time clock on each tile.
// IANA ids handle daylight saving automatically.
const LAB_TZ = {
  LA:  'America/Los_Angeles',
  LV:  'America/Los_Angeles',
  CH:  'America/Chicago',
  DAL: 'America/Chicago',
  ENG: 'America/New_York',
  HAU: 'America/New_York',
  ATL: 'America/New_York',
  ORL: 'America/New_York'
};

function localTimeFor(lab) {
  const tz = LAB_TZ[lab];
  if (!tz) return '';
  try {
    return new Intl.DateTimeFormat('en-US', {
      timeZone: tz, hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true
    }).format(new Date());
  } catch (e) {
    return '';
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = line.split(',').map(v => v.trim().replace(/"/g, ''));
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

function getLocation(serverName) {
  return (serverName || '').split('-')[0];
}

function normalizeDate(dateStr) {
  if (!dateStr) return '';
  // Handle YYYYMMDD (no separators) → YYYY-MM-DD
  if (/^\d{8}$/.test(dateStr.trim())) {
    const s = dateStr.trim();
    return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  }
  // Handle M/D/YYYY or MM/DD/YYYY → YYYY-MM-DD
  const slash = dateStr.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (slash) {
    return `${slash[3]}-${slash[1].padStart(2,'0')}-${slash[2].padStart(2,'0')}`;
  }
  // Already YYYY-MM-DD or similar — return as-is
  return dateStr.trim();
}

// Safari-safe date builder. Safari's Date parser rejects strings like
// '2026-06-18 4:24 PM', so we construct the Date from explicit numeric parts.
function buildDate(rawDateStr, timeStr) {
  const dateStr = normalizeDate(rawDateStr || '');
  if (!dateStr) return null;
  const dm = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!dm) {
    const fallback = new Date(dateStr);
    return isNaN(fallback) ? null : fallback;
  }
  const year = parseInt(dm[1]), month = parseInt(dm[2]) - 1, day = parseInt(dm[3]);
  let h = 0, m = 0, s = 0;
  const tm = (timeStr || '').match(/(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)?/i);
  if (tm) {
    h = parseInt(tm[1]); m = parseInt(tm[2]); s = parseInt(tm[3] || 0);
    const ampm = tm[4];
    if (ampm) {
      if (ampm.toUpperCase() === 'PM' && h !== 12) h += 12;
      if (ampm.toUpperCase() === 'AM' && h === 12) h = 0;
    }
  }
  const d = new Date(year, month, day, h, m, s);
  return isNaN(d) ? null : d;
}

function parseRowDate(row) {
  return buildDate(row['Date'] || '', row['StartTime'] || '');
}

function isToday(row) {
  const d = parseRowDate(row);
  if (!d) return false;
  const now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
}

function isRecent(row, days) {
  const d = parseRowDate(row);
  if (!d) return false;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  return d >= cutoff;
}

function topValue(rows, field, weightField) {
  const counts = {};
  rows.forEach(r => {
    const key = r[field];
    if (!key) return;
    counts[key] = (counts[key] || 0) + (parseInt(r[weightField]) || 1);
  });
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0]?.[0] || '--';
}

function topServer(rows) {
  const counts = {};
  rows.forEach(r => {
    const key = r['ServerName'];
    if (!key) return;
    counts[key] = (counts[key] || 0) + 1;
  });
  const top = Object.entries(counts).sort((a,b) => b[1]-a[1])[0];
  return top ? `${top[0]} (${top[1]})` : '--';
}

function parseTime(t) {
  if (!t) return null;
  const match = t.match(/(\d+):(\d+)(?::(\d+))?\s*(AM|PM)?/i);
  if (!match) return null;
  let h = parseInt(match[1]), m = parseInt(match[2]), s = parseInt(match[3] || 0);
  const ampm = match[4];
  if (ampm) {
    if (ampm.toUpperCase() === 'PM' && h !== 12) h += 12;
    if (ampm.toUpperCase() === 'AM' && h === 12) h = 0;
  }
  return h * 3600 + m * 60 + s;
}

function avgSessionTime(rows) {
  const durations = [];
  rows.forEach(r => {
    const dateStr = r['Date'] || '';
    if (!dateStr) return;
    const start = buildDate(dateStr, r['StartTime'] || '');
    const finish = buildDate(dateStr, r['FinishTime'] || '');
    if (start && finish && finish > start) {
      durations.push((finish - start) / 60000);
    }
  });
  if (!durations.length) return '--';
  return Math.round(durations.reduce((a, b) => a + b, 0) / durations.length) + ' min';
}

function avgClientCount(rows) {
  if (!rows.length) return '--';
  return Math.round(rows.reduce((s, r) => s + (parseInt(r['ClientCount']) || 0), 0) / rows.length).toString();
}

function avgImageSize(rows) {
  // Average WIM size in GB. Strips non-numeric (handles "15.4GB" or "15.4").
  const sizes = [];
  rows.forEach(r => {
    const raw = (r['ImageSize'] || '').replace(/[^0-9.]/g, '');
    const val = parseFloat(raw);
    if (!isNaN(val) && val > 0) sizes.push(val);
  });
  if (!sizes.length) return '--';
  return (sizes.reduce((a, b) => a + b, 0) / sizes.length).toFixed(1) + ' GB';
}

function gigsPushed(rows) {
  // Total GB pushed = sum of (ImageSize GB * ClientCount) across rows.
  let total = 0;
  rows.forEach(r => {
    const raw = (r['ImageSize'] || '').replace(/[^0-9.]/g, '');
    const size = parseFloat(raw);
    const clients = parseInt(r['ClientCount']) || 0;
    if (!isNaN(size) && size > 0 && clients > 0) total += size * clients;
  });
  return total; // in GB
}

function formatGB(totalGB) {
  // Auto-scale GB -> TB -> PB -> EB.
  if (!totalGB || totalGB <= 0) return '0 GB';
  const units = ['GB', 'TB', 'PB', 'EB'];
  let value = totalGB, i = 0;
  while (value >= 1024 && i < units.length - 1) { value /= 1024; i++; }
  const formatted = i === 0 ? Math.round(value).toLocaleString() : value.toFixed(1);
  return `${formatted} ${units[i]}`;
}

function nowInTZ(tz) {
  try {
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    }).formatToParts(new Date());
    const g = t => parseInt(parts.find(p => p.type === t).value, 10);
    let hh = g('hour'); if (hh === 24) hh = 0;
    return new Date(g('year'), g('month') - 1, g('day'), hh, g('minute'), g('second'));
  } catch (e) {
    return new Date();
  }
}

// Active = most recent parseable FinishTime for this branch is within ACTIVE_WINDOW_MIN,
// compared wall-clock-to-wall-clock in the branch's own timezone.
function isLabActive(labRows, lab) {
  const tz = LAB_TZ[lab];
  if (!tz) return false;
  const now = nowInTZ(tz);
  let latest = null;
  labRows.forEach(r => {
    const d = buildDate(r['Date'] || '', r['FinishTime'] || '');
    if (d && (!latest || d > latest)) latest = d;
  });
  if (!latest) return false;
  const ageMin = (now - latest) / 60000;
  return ageMin <= ACTIVE_WINDOW_MIN && ageMin >= -10;
}

function buildDashboard(data) {
  lastLoadTime = new Date();
  const filtered = data.filter(r => !EXCLUDED.includes(getLocation(r['ServerName'] || '')));
  latestFiltered = filtered;
  buildPeakTile(filtered);

  // Last entry timestamp — skip excluded servers and unparseable dates
  const lastRow = [...data].reverse().find(r => {
    const loc = getLocation(r['ServerName'] || '');
    return !EXCLUDED.includes(loc) && parseRowDate(r) !== null;
  });
  if (lastRow) {
    const d = parseRowDate(lastRow);
    const lab = getLocation(lastRow['ServerName'] || '') || '--';
    if (d) {
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      let h = d.getHours(), m = d.getMinutes().toString().padStart(2,'0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      const label = `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} · ${h}:${m} ${ampm} — ${lab}`;
      document.getElementById('lastEntryDisplay').textContent = label;

async function loadData() {
  try {
    const rawUrl = `https://raw.githubusercontent.com/technicalservices1/SMARTCAST-LABS/main/SmartCast%20Imaging%20Log.csv`;
    const res = await fetch(rawUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    buildDashboard(parseCSV(text));
    if (panelMode === 'lab' && panelOpenLab) renderPanelContents(panelOpenLab);
    else if (panelMode === 'zones') renderZonePanel();
  } catch(e) {
    document.getElementById('labGrid').innerHTML = `<div class="error">Error loading data: ${e.message}<br>Check the repo path and that the CSV is public.</div>`;
  }
}

loadData();
setInterval(loadData, 300000);

function updateClock() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const day = days[now.getDay()];
  const month = months[now.getMonth()];
  const date = now.getDate();
  const year = now.getFullYear();
  let hours = now.getHours();
  const minutes = now.getMinutes().toString().padStart(2, '0');
  const ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12 || 12;
  const seconds = now.getSeconds().toString().padStart(2, '0');
  document.getElementById('clockDisplay').textContent = `${day}, ${month} ${date}, ${year} · ${hours}:${minutes}:${seconds} ${ampm}`;
}
updateClock();
setInterval(updateClock, 1000);

// Keep each tile's local-time clock current (re-reads the system clock every second).
function updateLabClocks() {
  document.querySelectorAll('.lab-local-time').forEach(el => {
    const lab = el.getAttribute('data-lab');
    const t = localTimeFor(lab);
    if (t) el.textContent = t;
  });
}
setInterval(updateLabClocks, 1000);

/* ---------- Rotation / spotlight engine ----------
   Sequence: full overview for OVERVIEW_MS, then each branch tile for TILE_MS,
   scaled up + centered, fading between slides. Loops forever.
   Opening a detail panel pauses; closing it resumes. Data keeps refreshing in the
   background (setInterval(loadData,...)) independently of the rotation. */
const OVERVIEW_MS = 55000;  // 55 seconds
const TILE_MS = 20000;      // 20 seconds per tile
const FADE_MS = 500;

function frameEl() { return document.querySelector('.monitor-frame'); }
function gridEl() { return document.getElementById('labGrid'); }

function showOverview() {
  const frame = frameEl();
  frame.classList.remove('spotlight');
  gridEl().querySelectorAll('.lab-card').forEach(c => c.classList.remove('spot-active'));
}

function showTile(i) {
  const frame = frameEl();
  frame.classList.add('spotlight');
  const cards = gridEl().querySelectorAll('.lab-card');
  cards.forEach(c => c.classList.remove('spot-active'));
  if (cards[i]) cards[i].classList.add('spot-active');
}

function applyStage() {
  // Fade only the grid region out, swap the stage, fade back in.
  // Summary bars stay visible at all times.
  const grid = gridEl();
  grid.classList.add('fade-out');
  setTimeout(() => {
    if (rotationIndex < 0) showOverview();
    else showTile(rotationIndex);
    grid.classList.remove('fade-out');
  }, FADE_MS);
}

function scheduleNext() {
  clearTimeout(rotationTimer);
  const dwell = (rotationIndex < 0) ? OVERVIEW_MS : TILE_MS;
  rotationTimer = setTimeout(() => {
    // advance: overview(-1) -> 0 -> 1 -> ... -> last -> overview(-1)
    rotationIndex = (rotationIndex + 1 >= LABS.length) ? -1 : rotationIndex + 1;
    applyStage();
    scheduleNext();
  }, dwell);
}

function startRotation() {
  rotationIndex = -1;
  showOverview();
  scheduleNext();
}

// Kick off the rotation once the first data render has had a moment to build cards.

const ZONE_OF = { LA:'Pacific', LV:'Pacific', CH:'Central', DAL:'Central', ENG:'Eastern', HAU:'Eastern', ATL:'Eastern', ORL:'Eastern' };
// US zones all shift for DST together, so these offsets to Eastern hold year-round.
const ZONE_OFFSET = { Pacific: -3, Central: -1, Eastern: 0 };
const PEAK_START_HR = 7, PEAK_END_HR = 20;   // inclusive range shown on the strip
const PEAK_WINDOW_DAYS = 30;                 // rolling window for the time-zone activity tile
const PEAK_RANGE_THRESHOLD = 0.75;           // an hour joins the peak range if >= this share of the busiest hour

function parseHour12(t) {
  const m = /^(\d{1,2}):(\d{2})(?::\d{2})?\s*([AaPp])[Mm]$/.exec((t || '').trim());
  if (!m) return null;
  let h = parseInt(m[1], 10) % 12;
  if (m[3].toLowerCase() === 'p') h += 12;
  return h;
}

function buildPeakTile(rows) {
  const el = document.getElementById('summarySide');
  if (!el) return;
  const zones = ['Pacific','Central','Eastern'];
  const colors = { Pacific:'#60a5fa', Central:'#a78bfa', Eastern:'#34d399' };
  const span = PEAK_END_HR - PEAK_START_HR + 1;
  const byZone = {}; zones.forEach(z => byZone[z] = new Array(span).fill(0));
  const total = new Array(span).fill(0);
  rows.filter(r => isRecent(r, PEAK_WINDOW_DAYS)).forEach(r => {
    const lab = getLocation(r['ServerName'] || '');
    const z = ZONE_OF[lab]; if (!z) return;
    const h = parseHour12(r['StartTime']); if (h === null) return;
    const he = ((h - ZONE_OFFSET[z]) % 24 + 24) % 24;
    const i = he - PEAK_START_HR;
    if (i >= 0 && i < span) { byZone[z][i]++; total[i]++; }
  });
  const mx = Math.max(1, ...zones.flatMap(z => byZone[z]));
  const grand = total.reduce((a,b) => a+b, 0);
  const fmtH = h => `${h % 12 || 12}${h < 12 ? "AM" : "PM"}`;
  // Peak range: longest run of hours at >= PEAK_RANGE_THRESHOLD of the busiest hour.
  const peakVal = Math.max(...total);
  let run = [], bestRun = [];
  for (let i = 0; i < span; i++) {
    if (total[i] >= PEAK_RANGE_THRESHOLD * peakVal) { run.push(i); if (run.length > bestRun.length) bestRun = run.slice(); }
    else run = [];
  }
  const rangeTxt = bestRun.length
    ? `${fmtH(PEAK_START_HR + bestRun[0])}\u2013${fmtH(PEAK_START_HR + bestRun[bestRun.length-1] + 1)}`
    : '\u2014';
  const rangeVol = bestRun.reduce((a,i) => a + total[i], 0);
  const rangePct = grand ? Math.round(100 * rangeVol / grand) : 0;
  const rowsHtml = zones.map(z => {
    const cols = byZone[z].map(v => {
      const hgt = v ? Math.max(7, Math.round(100 * v / mx)) : 3;
      const op = v ? (0.35 + 0.65 * v / mx).toFixed(2) : 0.12;
      return `<div class="side-c" style="height:${hgt}%;background:${colors[z]};opacity:${op}"></div>`;
    }).join('');
    return `<div class="side-row"><div class="side-zl">${z}</div><div class="side-cols">${cols}</div></div>`;
  }).join('');
  const ticks = [7,9,11,13,15,17,19].map(h => `<span>${h % 12 || 12}${h < 12 ? 'A' : 'P'}</span>`).join('');
  el.innerHTML = `
    <div class="side-hdr"><div class="side-ttl">Imaging Activity by Time Zone</div><div class="side-et">Last ${PEAK_WINDOW_DAYS} days &middot; all times ET</div></div>
    <div class="side-stat"><div class="side-big">${rangeTxt}</div>
      <div class="side-sub">busiest window &middot; ${rangePct}% of all imaging</div></div>
    <div class="side-rows">${rowsHtml}</div>
    <div class="side-axis">${ticks}</div>`;
}

function renderZonePanel() {
  const zones = ['Pacific','Central','Eastern'];
  const colors = { Pacific:'#60a5fa', Central:'#a78bfa', Eastern:'#34d399' };
  const span = PEAK_END_HR - PEAK_START_HR + 1;
  const byZone = {}, labsOf = {};
  zones.forEach(z => { byZone[z] = new Array(span).fill(0); labsOf[z] = []; });
  Object.keys(ZONE_OF).forEach(l => { if (labsOf[ZONE_OF[l]]) labsOf[ZONE_OF[l]].push(l); });
  latestFiltered.filter(r => isRecent(r, PEAK_WINDOW_DAYS)).forEach(r => {
    const lab = getLocation(r['ServerName'] || '');
    const z = ZONE_OF[lab]; if (!z) return;
    const h = parseHour12(r['StartTime']); if (h === null) return;   // LOCAL hour — no conversion
    const i = h - PEAK_START_HR;
    if (i >= 0 && i < span) byZone[z][i]++;
  });
  const fmtH = h => `${h % 12 || 12}${h < 12 ? 'AM' : 'PM'}`;
  const ticks = [];
  for (let h = PEAK_START_HR; h <= PEAK_END_HR; h++) {
    ticks.push(`<span>${(h - PEAK_START_HR) % 2 === 0 ? (h % 12 || 12) + (h < 12 ? 'A' : 'P') : ''}</span>`);
  }
  const tickHtml = ticks.join('');
  const blocks = zones.map(z => {
    const arr = byZone[z];
    const tot = arr.reduce((a,b) => a+b, 0);
    const mx = Math.max(1, ...arr);
    let run = [], best = [];
    for (let i = 0; i < span; i++) {
      if (arr[i] >= PEAK_RANGE_THRESHOLD * mx) { run.push(i); if (run.length > best.length) best = run.slice(); }
      else run = [];
    }
    const rangeTxt = best.length ? `${fmtH(PEAK_START_HR+best[0])}\u2013${fmtH(PEAK_START_HR+best[best.length-1]+1)}` : '\u2014';
    const pct = tot ? Math.round(100 * best.reduce((a,i) => a+arr[i], 0) / tot) : 0;
    const cols = arr.map((v,i) => {
      const hh = v ? Math.max(4, Math.round(100 * v / mx)) : 2;
      const op = v ? (0.35 + 0.65 * v / mx).toFixed(2) : 0.12;
      return `<div class="zc" style="height:${hh}%;background:${colors[z]};opacity:${op}" title="${fmtH(PEAK_START_HR+i)} \u2014 ${v} sessions"></div>`;
    }).join('');
    return `<div class="zone-block">
      <div class="zone-head">
        <div><div class="zone-name" style="color:${colors[z]}">${z}</div>
             <div class="zone-labs">${labsOf[z].join(' \u00b7 ')}</div></div>
        <div class="zone-stat"><div class="zone-range">${rangeTxt}</div>
             <div class="zone-sub">busiest locally &middot; ${pct}% of ${tot} sessions</div></div>
      </div>
      <div class="zone-chart">${cols}</div>
      <div class="zone-axis">${tickHtml}</div></div>`;
  }).join('');
  document.getElementById('labPanelTitle').textContent = `Busiest Hours by Time Zone \u2014 Local Time (Last ${PEAK_WINDOW_DAYS} Days)`;
  document.getElementById('labPanelBody').innerHTML = blocks;
  const st = document.getElementById('labPanelStamp');
  if (st) {
    if (lastLoadTime) {
      let h = lastLoadTime.getHours(); const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
      const m = String(lastLoadTime.getMinutes()).padStart(2,'0');
      const sec = String(lastLoadTime.getSeconds()).padStart(2,'0');
      st.textContent = `Each zone shown in its own local time &middot; data as of ${h}:${m}:${sec} ${ap}`;
      st.innerHTML = `Each zone shown in its own local time \u00b7 data as of ${h}:${m}:${sec} ${ap}`;
    } else { st.textContent = ''; }
  }
}

function openZonePanel() {
  panelMode = 'zones';
  panelOpenLab = null;
  renderZonePanel();
  document.getElementById('labPanel').style.display = 'flex';
  pauseRotation();
}

document.addEventListener('DOMContentLoaded', () => {
  const side = document.getElementById('summarySide');
  if (side) side.addEventListener('click', openZonePanel);
});
const _sideEl = document.getElementById('summarySide');
if (_sideEl) _sideEl.addEventListener('click', openZonePanel);
setTimeout(startRotation, 1500);

function pauseRotation() { rotationPaused = true; clearTimeout(rotationTimer); }
function resumeRotation() { if (rotationPaused) { rotationPaused = false; scheduleNext(); } }

function renderPanelContents(lab) {
  const N = SESSION_LIST_COUNT;
  const valid = latestFiltered.filter(r => getLocation(r['ServerName'] || '') === lab && parseRowDate(r) !== null);
  const recent = valid.slice(-N).reverse();
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let bodyHtml;
  if (recent.length === 0) {
    bodyHtml = `<div class="lab-panel-empty">No recent sessions on record for ${esc(lab)}.</div>`;
  } else {
    const trs = recent.map(r => {
      const d = parseRowDate(r);
      const when = d ? `${mo[d.getMonth()]} ${d.getDate()} · ${esc(r['StartTime'] || '')}` : esc(r['StartTime'] || '');
      return `<tr><td>${when}</td><td>${esc(r['Model'])}</td><td class="img" title="${esc(r['ImageName'])}">${esc(r['ImageName'])}</td><td class="num">${esc(r['ClientCount'])}</td><td class="num">${esc(r['ImageSize'])}</td><td class="num">${esc(r['TotalTime'])}</td><td>${esc(r['ServerName'])}</td></tr>`;
    }).join('');
    bodyHtml = `<table class="lab-panel-table"><thead><tr><th>When Ran</th><th>Model</th><th>Image</th><th class="num">Clients</th><th class="num">Size</th><th class="num">Total Time</th><th>Server</th></tr></thead><tbody>${trs}</tbody></table>`;
  }
  document.getElementById('labPanelTitle').textContent = `${lab} — Last ${N} Sessions`;
  document.getElementById('labPanelBody').innerHTML = bodyHtml;
  const stampEl = document.getElementById('labPanelStamp');
  if (stampEl) {
    if (lastLoadTime) {
      let h = lastLoadTime.getHours(); const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
      const m = String(lastLoadTime.getMinutes()).padStart(2,'0');
      const s = String(lastLoadTime.getSeconds()).padStart(2,'0');
      stampEl.textContent = `Data as of ${h}:${m}:${s} ${ap}`;
    } else {
      stampEl.textContent = '';
    }
  }
}

function openLabPanel(lab) {
  panelMode = 'lab';
  panelOpenLab = lab;
  renderPanelContents(lab);
  document.getElementById('labPanel').style.display = 'flex';
  pauseRotation();
}

function closeLabPanel() {
  panelMode = null;
  panelOpenLab = null;
  document.getElementById('labPanel').style.display = 'none';
  resumeRotation();
}

document.getElementById('labPanelClose').addEventListener('click', closeLabPanel);
document.getElementById('labPanel').addEventListener('click', (e) => { if (e.target.id === 'labPanel') closeLabPanel(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLabPanel(); });
</script>
</body>
</html>
